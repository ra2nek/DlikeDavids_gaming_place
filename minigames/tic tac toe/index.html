<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic tac toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../base.css">
    <script src="../../basics.js" defer></script>
    <script src="script.js" defer></script>
    
</head>
<body class="center column">
    <div id="white-screen" class="absolute center">Loading<span id="dots"></span></div>
    <div id="winscreen" class="absolute center"><span id="player"></span> HAS WON</div>
    <div class="line" id="row1"></div>
    <div class="line" id="row2"></div>
    <div class="line" id="row3"></div>
    <div class="line" id="col1"></div>
    <div class="line" id="col2"></div>
    <div class="line" id="col3"></div>
    <div class="line" id="diag1"></div>
    <div class="line" id="diag2"></div>
    <div class="game grid">
        <div class="cell center"></div>
        <div class="cell center"></div>
        <div class="cell center"></div>
        <div class="cell center"></div>
        <div class="cell center"></div>
        <div class="cell center"></div>
        <div class="cell center"></div>
        <div class="cell center"></div>
        <div class="cell center"></div>
    </div>
    <button onclick="reset()" class="btn larger">RESET</button>
    <div class="arrow"><a href="../../index.html"><img src="../../img/arrow.png" alt="GO BACK"></a></div>
    <div id="gameOptions" class="absolute spaceEvenly column closed">
        <p>Nothing here yet :[</p>
    </div>
    <img src="../../img/cogwheel.png" alt="options" id="cogwheel" class="absolute" onclick="toggleOptions()" draggable="false">
</body>
</html>
